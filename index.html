<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 우당탕탕 16가지 MBTI 테스트 ✨</title>
    <style>
        :root {
            --primary-color: #6C5CE7;
            --secondary-color: #A8A5FF;
            --background-color: #F8F9FA;
            --text-color: #2D3436;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        /* 시작 화면 */
        h1 { font-size: 1.8rem; color: var(--primary-color); margin-bottom: 10px; }
        .intro-emoji { font-size: 4rem; margin: 20px 0; }
        
        /* 공통 버튼 */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); }

        /* 진행 바 */
        .progress-container {
            width: 100%;
            height: 10px;
            background-color: #E9ECEF;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 질문 화면 */
        .question-text { font-size: 1.3rem; font-weight: bold; margin-bottom: 40px; word-break: keep-all; }
        .answer-btn {
            background-color: #f1f3f5;
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 18px;
            font-size: 1rem;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: all 0.2s ease;
            text-align: left;
        }
        .answer-btn:hover { background-color: var(--secondary-color); color: white; }

        /* 결과 화면 */
        .result-emoji { font-size: 5rem; margin: 20px 0; animation: bounce 1s infinite alternate; }
        .result-mbti { font-size: 2.5rem; font-weight: 900; color: var(--primary-color); margin: 0; }
        .result-title { font-size: 1.4rem; font-weight: bold; color: #4a4a4a; margin-top: 5px; }
        
        .box {
            background-color: #F8F9FA;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
        }
        .box h3 { margin-top: 0; color: var(--primary-color); font-size: 1.1rem; }
        .box ul { padding-left: 20px; margin: 0; }
        .box li { margin-bottom: 8px; }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 시작 화면 -->
        <div id="start-screen" class="screen active">
            <h1>✨ 우당탕탕 MBTI 테스트 ✨</h1>
            <p>나와 딱 맞는 캐릭터와 성격을 알아보자!</p>
            <div class="intro-emoji">🕵️‍♂️ 🧠 🚀 🎨</div>
            <p style="color: #666; font-size: 0.9rem;">총 32문항 / 소요 시간 약 3분</p>
            <button class="btn" onclick="startTest()">테스트 시작하기</button>
        </div>

        <!-- 2. 질문 화면 -->
        <div id="question-screen" class="screen">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="question-text" class="question-text">질문 텍스트가 들어가는 곳</div>
            <button class="answer-btn" id="answer-a" onclick="selectAnswer('A')">답변 A</button>
            <button class="answer-btn" id="answer-b" onclick="selectAnswer('B')">답변 B</button>
        </div>

        <!-- 3. 결과 화면 -->
        <div id="result-screen" class="screen">
            <p>당신의 성격 유형은?</p>
            <div id="result-emoji" class="result-emoji">🤖</div>
            <h2 id="result-mbti" class="result-mbti">INTP</h2>
            <div id="result-title" class="result-title">호기심 많은 AI 로봇</div>
            
            <div class="box">
                <h3>👍 이런 점이 최고에요 (장점)</h3>
                <ul id="result-pros"></ul>
            </div>
            
            <div class="box">
                <h3>👎 이런 점은 조심해야 해요 (단점)</h3>
                <ul id="result-cons"></ul>
            </div>

            <button class="btn" onclick="restartTest()">다시 테스트하기</button>
        </div>
    </div>

    <script>
        // 1차 개발용 간결한 32가지 질문 데이터 (E/I, S/N, T/F, J/P 각 8문항씩)
        const questions = [
            // E vs I (1~8)
            { type: "EI", q: "주말에 에너지를 충전하는 방법은?", a: "친구들과 만나서 신나게 수다 떨기", b: "집에서 혼자 이불 덮고 넷플릭스 보기" },
            { type: "EI", q: "새로운 모임에 갔을 때 나는?", a: "먼저 말을 걸며 분위기를 주도한다", b: "누가 말을 걸어줄 때까지 가만히 있는다" },
            { type: "EI", q: "팀 프로젝트를 할 때 선호하는 역할은?", a: "사람들과 의견을 조율하는 발표자/리더", b: "뒤에서 묵묵히 자료를 조사하는 팀원" },
            { type: "EI", q: "기분이 우울할 때 해결책은?", a: "밖으로 나가서 사람들을 만나 푼다", b: "혼자만의 시간을 가지며 생각을 정리한다" },
            { type: "EI", q: "전화 통화와 문자 중 더 편한 것은?", a: "용건이 있으면 바로 전화하는 게 편함", b: "메시지로 한 자 한 자 고심해서 보내는 게 편함" },
            { type: "EI", q: "나에게 '휴식'이란?", a: "새로운 자극과 활동적인 경험을 하는 것", b: "방해받지 않는 나만의 조용한 공간에 있는 것" },
            { type: "EI", q: "아는 사람을 길에서 우연히 마주치면?", a: "반갑게 이름을 부르며 다가간다", b: "못 본 척 조용히 지나치거나 돌아간다" },
            { type: "EI", q: " 내 생각이나 감정을 표현할 때?", a: "말이 먼저 튀어나오는 편이다", b: "글로 쓰는 게 훨씬 정리가 잘 된다" },

            // S vs N (9~16)
            { type: "SN", q: "사과를 보면 드는 생각은?", a: "맛있겠다, 빨갛다, 아삭하겠다", b: "스티브 잡스.. 뉴턴.. 백설공주.. 독사과..?" },
            { type: "SN", q: "영화를 볼 때 내가 더 몰입하는 부분은?", a: "현실감 넘치는 액션과 탄탄한 고증", b: "감독이 숨겨놓은 세계관과 복선, 열린 결말" },
            { type: "SN", q: "설명서를 읽을 때 나는?", a: "1번부터 순서대로 꼼꼼하게 읽고 따라 한다", b: "대충 직관적으로 조립하다가 막히면 읽는다" },
            { type: "SN", q: "비행기를 탔을 때 하는 생각은?", a: "도착하면 뭐부터 먹을까? 맛집 검색하자", b: "만약에 지금 엔진이 고장 나서 추락하면 어쩌지?" },
            { type: "SN", q: "친구의 집들이 선물을 고를 때?", a: "친구가 당장 필요하다고 했던 실용적인 휴지/세제", b: "집안 분위기를 감성 있게 만들어줄 유니크한 조명" },
            { type: "SN", q: "과거의 기억을 떠올릴 때 내 방식은?", a: "당시 있었던 사실과 상황을 명확하게 기억함", b: "사실보다는 그때 느꼈던 전체적인 분위기로 기억함" },
            { type: "SN", q: "노래를 들을 때 먼저 귀에 들어오는 것은?", a: "신나는 멜로디와 리듬", b: "마음을 울리거나 심오한 가사" },
            { type: "SN", q: "멍 때릴 때 내 머릿속은?", a: "진짜로 아무 생각도 안 하고 있음", b: "꼬리에 꼬리를 무는 상상의 나래를 펼침" },

            // T vs F (17~24)
            { type: "TF", q: "친구가 '나 슬퍼서 빵 샀어'라고 한다면 내 반응은?", a: "왜 슬퍼? 근데 무슨 빵 샀어?", b: "무슨 일 있어? 왜 슬퍼 ㅠㅠ 울지마" },
            { type: "TF", q: "친구가 열심히 준비한 시험에서 떨어졌을 때?", a: "다음 시험 전략이나 실수를 분석해 준다", b: "속상하겠다며 맛있는 걸 사주고 위로해 준다" },
            { type: "TF", q: "상처를 더 많이 받는 말은?", a: "너 일 왜 이렇게 대충 해?", b: "너랑은 말이 안 통하는 것 같아" },
            { type: "TF", q: "고민 상담을 해줄 때 내 스타일은?", a: "명확한 해결책을 제시하는 팩폭러", b: "무조건 네 말이 맞다며 편들어주는 공감러" },
            { type: "TF", q: "친구가 '나 차 사고 났어'라고 연락하면?", a: "보험은 불렀어? 다친 데는 없고?", b: "헐 대박 많이 놀랐겠다!! 괜찮아?!" },
            { type: "TF", q: "영화나 드라마를 보면서 눈물을?", a: "거의 흘리지 않는다. 개연성을 따지게 됨", b: "등장인물에 과몰입해서 폭풍 오열한다" },
            { type: "TF", q: "칭찬을 들을 때 더 기분 좋은 말은?", a: "와, 너 진짜 똑똑하고 일 잘한다!", b: "너랑 있으면 마음이 편해지고 위로가 돼" },
            { type: "TF", q: "의견 충돌이 생겼을 때 나는?", a: "시시비비를 명확히 가려 결론을 내야 함", b: "서로 감정이 상하지 않게 둥글게 넘어가야 함" },

            // J vs P (25~32)
            { type: "JP", q: "여행 계획을 세울 때 나의 모습은?", a: "시간별 동선, 맛집 브레이크 타임까지 엑셀로 정리", b: "비행기 표랑 숙소만 예약하고 나머지는 가서 생각" },
            { type: "JP", q: "과제나 업무 마감일이 다가올 때?", a: "미리미리 계획대로 끝내놓고 마음 편히 쉰다", b: "미룰 수 있을 때까지 미루다 벼락치기로 끝낸다" },
            { type: "JP", q: "내 방이나 책상 상태는?", a: "물건들이 제자리에 깔끔하게 정리되어 있음", b: "나만의 어지러운 규칙이 있음 (찾을 순 있음)" },
            { type: "JP", q: "친구가 갑자기 '지금 집 앞인데 나올래?' 한다면?", a: "갑작스러운 번개는 사절.. 계획에 없던 일이라 당황함", b: "좋아! 완전 콜! 준비하고 바로 나감" },
            { type: "JP", q: "약속 장소로 향할 때 나는?", a: "몇 분 차를 타야 늦지 않는지 미리 계산하고 출발", b: "일단 준비 끝나는 대로 대충 시간 맞춰 나감" },
            { type: "JP", q: "재난 상황을 대비한 생필품이 집에?", a: "비상약이나 여분 물품이 항상 구비되어 있음", b: "떨어지면 그때 마트 가거나 쿠팡으로 시킴" },
            { type: "JP", q: "새로운 일을 시작할 때 선호하는 방식은?", a: "전체적인 체크리스트와 가이드라인을 만들고 시작", b: "일단 부딪혀보면서 몸으로 배움" },
            { type: "JP", q: "일정이 갑자기 취소되었을 때?", a: "계획이 틀어져서 살짝 짜증 나거나 붕 뜬 기분", b: "오예! 개꿀! 집에서 뒹굴거릴 명분이 생겼다" }
        ];

        // 16가지 결과 데이터 (이모지 캐릭터, 장단점 포함)
        const results = {
            ISTJ: { emoji: "💼", title: "꼼꼼한 원칙주의 청렴결백 선비", pros: ["책임감이 엄청나게 강함", "한 번 시작한 일은 끝까지 해냄", "시간 약속을 칼같이 지킴"], cons: ["변화에 적응하는 걸 힘들어함", "융통성이 부족하다는 소리를 들음", "공감보다는 해결책이 먼저 나감"] },
            ISFJ: { emoji: "🐰", title: "천사표 내조의 왕 수호자", pros: ["주변 사람들을 정말 잘 챙김", "경청을 잘하고 공감 능력이 뛰어남", "기억력이 좋아 사소한 것도 기억함"], cons: ["거절을 못 해서 혼자 속앓이함", "남 눈치를 너무 많이 봄", "상처를 받아도 뒤끝으로 남겨둠"] },
            INFJ: { emoji: "🔮", title: "속을 알 수 없는 신비로운 예언자", pros: ["통찰력이 뛰어나고 생각이 깊음", "타인의 감정을 귀신같이 캐치함", "이상주의자라 세상을 바꾸고 싶어 함"], cons: ["생각이 너무 많아서 불면증 달고 삼", "마음의 벽이 은근히 높음", "자신에게 너무 엄격함"] },
            INTJ: { emoji: "🦉", title: "지독한 전략가 팩폭 마스터", pros: ["지적 호기심이 많고 효율성 극대화", "독립적이고 자기관리가 철저함", "문제를 이성적으로 해결함"], cons: ["차가워 보인다는 말을 자주 들음", "인간관계에 감정 소모를 싫어함", "남의 의견을 잘 안 들을 때가 있음"] },
            ISTP: { emoji: "🛠️", title: "만능 맥가이버 효율 지상주의자", pros: ["위기 상황에서 누구보다 침착함", "손재주가 좋고 도구를 잘 다룸", "쓸데없는 감정 소모 안 함"], cons: ["만사가 귀찮고 은근 개인주의", "연락을 귀찮아해서 잠수 잘 탐", "공감 능력 영혼 가출 상태 자주 옴"] },
            ISFP: { emoji: "🎨", title: "침대 위 고양이 호기심 많은 예술가", pros: ["따뜻하고 온화한 성격의 소유자", "예술적 감각이나 미적 감각이 좋음", "갈등을 싫어해서 다 맞춰줌"], cons: ["추진력이 부족하고 미루기 대판왕", "결정 장애를 심하게 겪음", "집 밖으로 나오는 데 큰 결심 필요"] },
            INFP: { emoji: "🦄", title: "망상 가득 감성 끝판왕 낭만가", pros: ["마음이 따뜻하고 배려심이 깊음", "창의력과 상상력이 풍부함", "공감 능력이 우주를 뚫음"], cons: ["쿠쿠다스 멘탈이라 멘탈이 잘 바스러짐", "실행력이 부족하고 잡생각이 많음", "비판을 받으면 하루 종일 신경 씀"] },
            INTP: { emoji: "🤖", title: "걸어 다니는 백과사전 방구석 아인슈타인", pros: ["분석력과 논리력이 뛰어남", "틀에 박힌 생각 거부, 창의적임", "남 시선 신경 안 쓰고 마이웨이"], cons: ["인간관계에 은근히 둔감함", "설명할 때 말이 너무 설명충 같아짐", "시작은 거창하나 마무리가 안 됨"] },
            ESTP: { emoji: "🏍️", title: "에너자이저 인생은 실전이다 행동파", pros: ["적응력이 뛰어나고 유머 감각 폭발", "도전 정신이 강해 바로 실행함", "뒤끝 없고 쿨한 성격"], cons: ["말보다 행동이 앞서 사고 칠 때 있음", "진지한 분위기를 못 견딤", "끈기가 부족해 쉽게 실증 느뀜"] },
            ESFP: { emoji: "🎉", title: "분위기 메이커 핵인싸 연예인", pros: ["어딜 가나 사랑받는 분위기 메이커", "긍정적이고 에너지가 넘침", "사교성이 좋아서 친구가 많음"], cons: ["충동구매와 소비가 심함", "혼자 있으면 급격히 외로워함", "진지한 조언도 잔소리로 들음"] },
            ENFP: { emoji: "🐶", title: "리액션 봇 에너제틱 골든리트리버", pros: ["사람을 좋아하고 친화력 최고", "아이디어가 뱅크 수준으로 많음", "리액션이 좋아서 대화가 즐거움"], cons: ["끈기가 없어서 마무리를 잘 못함", "감정 기복이 롤러코스터 급임", "은근히 쉽게 피로해하는 유리 체력"] },
            ENTP: { emoji: "🤹", title: "프로 반론러 말싸움 이 구역의 최강자", pros: ["두뇌 회전이 빠르고 위트가 넘침", "토론과 논쟁을 즐기며 똑똑함", "자존감이 하늘을 찌름"], cons: ["은근히 킹받게 만드는 재주가 있음", "아는 척, 잘난 척이 심할 때 있음", "끈기가 부족해서 쉽게 질려함"] },
            ESTJ: { emoji: "📢", title: "인간 엑셀 팩폭기 엄격한 관리자", pros: ["조직을 이끄는 리더십이 뛰어남", "계획적이고 철저하게 일을 처리함", "결단력이 있어 일 처리가 빠름"], cons: ["공감 능력이 다소 떨어져 칼 같음", "고집이 세서 남을 가르치려 듦", "계획대로 안 되면 스트레스 폭발"] },
            ESFJ: { emoji: "🍕", title: "우리 동네 보안관 다정다감 친목왕", pros: ["친절하고 동정심이 많아 인기가 많음", "조화로운 관계를 유지하려 노력함", "예의 바르고 사회생활을 잘함"], cons: ["타인의 비판에 아주 취약함", "인정을 못 받으면 삐지거나 서운해함", "남 걱정 하느라 내 걱정 못 함"] },
            ENFJ: { emoji: "👑", title: "모두를 이끄는 정의로운 열정 댕댕이", pros: ["사람들을 이끄는 카리스마 리더십", "타인의 성장을 진심으로 도와줌", "말을 정말 예쁘고 설득력 있게 함"], cons: ["남의 문제에 너무 과몰입함", "거절을 잘 못하고 혼자 상처받음", "모든 사람에게 좋은 사람이고 싶어 함"] },
            ENTJ: { emoji: "🦁", title: "야망 가득 세상을 지배할 지휘관", pros: ["철저한 비전과 강력한 통솔력", "효율성을 극대화하는 능력", "어려운 문제도 척척 해결함"], cons: ["남 밑에서 일하는 거 절대 못함", "완벽주의 성향 때문에 부하직원 갉아먹음", "감정적인 위로를 시간 낭비라 생각함"] }
        };

        let currentIdx = 0;
        let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };

        function startTest() {
            document.getElementById("start-screen").classList.remove("active");
            document.getElementById("question-screen").classList.add("active");
            showQuestion();
        }

        function showQuestion() {
            if (currentIdx < questions.length) {
                // 진행바 업데이트
                const progress = (currentIdx / questions.length) * 100;
                document.getElementById("progress-bar").style.width = `${progress}%`;
                
                // 질문 및 답변 세팅
                const qObj = questions[currentIdx];
                document.getElementById("question-text").innerText = `Q${currentIdx + 1}. ${qObj.q}`;
                document.getElementById("answer-a").innerText = qObj.a;
                document.getElementById("answer-b").innerText = qObj.b;
            } else {
                showResult();
            }
        }

        function selectAnswer(choice) {
            const qObj = questions[currentIdx];
            // A를 선택하면 +1점, B를 선택하면 0점 (점수가 높을수록 앞 글자 성향)
            if (choice === 'A') {
                scores[qObj.type]++;
            }
            currentIdx++;
            showQuestion();
        }

        function showResult() {
            document.getElementById("question-screen").classList.remove("active");
            document.getElementById("result-screen").classList.add("active");

            // 8개 중 과반수(4개 초과) 여부로 MBTI 판별
            let mbti = "";
            mbti += (scores.EI >= 5) ? "E" : "I";
            mbti += (scores.SN >= 5) ? "S" : "N";
            mbti += (scores.TF >= 5) ? "T" : "F";
            mbti += (scores.JP >= 5) ? "J" : "P";

            const res = results[mbti];

            // 결과 화면 데이터 렌더링
            document.getElementById("result-emoji").innerText = res.emoji;
            document.getElementById("result-mbti").innerText = mbti;
            document.getElementById("result-title").innerText = res.title;

            // 장점 추가
            const prosList = document.getElementById("result-pros");
            prosList.innerHTML = "";
            res.pros.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                prosList.appendChild(li);
            });

            // 단점 추가
            const consList = document.getElementById("result-cons");
            consList.innerHTML = "";
            res.cons.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                consList.appendChild(li);
            });
        }

        function restartTest() {
            currentIdx = 0;
            scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
            document.getElementById("result-screen").classList.remove("active");
            document.getElementById("start-screen").classList.add("active");
        }
    </script>
</body>
</html>
