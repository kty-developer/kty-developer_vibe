<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 MBTI Professional Premium Test</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #EEF2FF;
            --accent: #10B981;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #4B5563;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            padding: 40px;
            box-sizing: border-box;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        h1, h2, h3 { margin-top: 0; font-weight: 700; }
        p { color: var(--text-muted); }
        
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.3); }

        /* 시작 화면 */
        .welcome-screen { text-align: center; padding: 20px 0; }
        .badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 16px;
        }
        .welcome-screen h1 { font-size: 2.2rem; margin-bottom: 12px; letter-spacing: -0.5px; }
        .main-illust { font-size: 4.5rem; margin: 24px 0; }

        /* 질문 화면 */
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.9rem; color: var(--text-muted); }
        .progress-bar-wrapper { width: 100%; height: 8px; background: var(--border); border-radius: 4px; margin-bottom: 40px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }
        .question-box { font-size: 1.4rem; font-weight: 700; margin-bottom: 35px; word-break: keep-all; line-height: 1.4; }
        
        .choice-btn {
            background: var(--card-bg);
            color: var(--text-main);
            border: 2px solid var(--border);
            padding: 20px;
            font-size: 1.05rem;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 16px;
            transition: all 0.2s ease;
            text-align: left;
            font-weight: 500;
        }
        .choice-btn:hover { border-color: var(--primary); background-color: var(--primary-light); color: var(--primary); }

        /* 결과 화면 */
        .result-header { text-align: center; padding-bottom: 30px; border-bottom: 1px solid var(--border); }
        .res-character { font-size: 5rem; margin-bottom: 10px; }
        .res-type { font-size: 3rem; font-weight: 900; color: var(--primary); letter-spacing: 2px; margin: 0; line-height: 1; }
        .res-title { font-size: 1.4rem; font-weight: 700; margin-top: 10px; color: #374151; }
        
        .report-section { margin-top: 30px; }
        .section-card {
            background: #F9FAFB;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .section-card h3 {
            font-size: 1.15rem;
            color: var(--text-main);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-card ul { padding-left: 20px; margin: 0; }
        .section-card li { margin-bottom: 10px; color: var(--text-muted); font-size: 0.98rem; }
